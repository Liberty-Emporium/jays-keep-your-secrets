{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<h2>⚙️ Settings</h2>

<div class="card">
    <h3>Add API Key</h3>
    <p>Go to <a href="/add" style="color: #e94560;">/add</a> to add a new API key</p>
</div>

<div class="card mt-4">
    <h3>Change Password</h3>
    <p>Go to <a href="/change-password" style="color: #e94560;">/change-password</a> to change your password</p>
</div>

<div class="card mt-4">
    <h3>My API Keys</h3>
    <p>View your keys at <a href="/dashboard" style="color: #e94560;">/dashboard</a></p>
</div>

<style>
.card {
    background: rgba(255,255,255,0.1);
    padding: 1.5rem;
    border-radius: 12px;
    margin-bottom: 1rem;
}
.card h3 { margin-bottom: 0.5rem; }
.card a { color: #e94560; }
.mt-4 { margin-top: 1.5rem; }
</style>
{% endblock %}
