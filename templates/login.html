{% extends "base.html" %}
{% block title %}Sign In — Keep Your Secrets{% endblock %}
{% block content %}
<div class="page-narrow">
  <div style="text-align:center;margin-bottom:28px">
    <h1 style="font-size:1.6rem;font-weight:800;letter-spacing:-0.5px">Welcome back</h1>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px">Sign in to your account</p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px">Sign In</button>
    </form>

    <div style="margin-top:16px;text-align:center;font-size:0.85rem;color:var(--text-muted)">
      <a href="/forgot-password">Forgot password?</a>
      &nbsp;&bull;&nbsp;
      <a href="/forgot-username">Forgot username?</a>
    </div>
  </div>

  <p style="text-align:center;margin-top:20px;font-size:0.9rem;color:var(--text-muted)">
    Don't have an account? <a href="/signup">Start free trial</a>
  </p>

  {% if demo_mode %}
  <div style="margin-top:16px;text-align:center">
    <a href="/demo" class="btn btn-outline btn-full">🎮 Try Demo</a>
  </div>
  {% endif %}
</div>
{% endblock %}
