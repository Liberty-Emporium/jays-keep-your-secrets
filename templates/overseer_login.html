<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Andy Keep Your Secrets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:#f8f9fa;} .card{border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);}</style>
</head>
<body>
<div style="max-width:400px;margin:5rem auto;padding:0 1rem;">
  <div style="text-align:center;font-size:2.5rem;margin-bottom:1rem;">🔑</div>
  <div class="card p-4">
    <h2 class="fw-bold text-center mb-1">Admin Login</h2>
    <p class="text-muted text-center small mb-4">Andy — Keep Your Secrets · Overseer</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{% if cat=='error' %}danger{% else %}success{% endif %} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3"><label class="form-label fw-bold small">Username</label>
        <input class="form-control" name="username" required autofocus></div>
      <div class="mb-3"><label class="form-label fw-bold small">Password</label>
        <input class="form-control" type="password" name="password" required></div>
      <button class="btn btn-dark w-100 fw-bold">Sign In →</button>
    </form>
    <p class="text-center mt-3 small"><a href="/">← Back to site</a></p>
  </div>
</div>
</body>
</html>
