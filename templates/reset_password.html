{% extends "base.html" %}
{% block title %}Reset Password — Jay{% endblock %}
{% block content %}
<div class="login-card" style="background:rgba(255,255,255,0.1);border-radius:12px;padding:2rem;max-width:400px;margin:0 auto;backdrop-filter:blur(10px);">
  <h2 style="text-align:center;margin-bottom:0.5rem;">🔐 Set New Password</h2>
  <p style="text-align:center;opacity:0.75;margin-bottom:1.5rem;font-size:0.9rem;">Choose a strong password — at least 6 characters.</p>

  {% if error %}
  <div style="background:rgba(233,69,96,0.2);border:1px solid rgba(233,69,96,0.5);border-radius:8px;padding:0.75rem;margin-bottom:1rem;font-size:0.9rem;">
    ❌ {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div style="margin-bottom:1.25rem;">
      <label style="display:block;margin-bottom:0.5rem;font-weight:600;">New Password</label>
      <input type="password" name="new_password" required minlength="6" placeholder="New password"
             style="width:100%;padding:0.75rem;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;font-size:1rem;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:1.25rem;">
      <label style="display:block;margin-bottom:0.5rem;font-weight:600;">Confirm Password</label>
      <input type="password" name="confirm_password" required minlength="6" placeholder="Confirm password"
             style="width:100%;padding:0.75rem;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;font-size:1rem;box-sizing:border-box;">
    </div>
    <button type="submit" class="btn" style="width:100%;">Reset Password</button>
  </form>
</div>
{% endblock %}
