{% extends "base.html" %}
{% block title %}Create Account — Keep Your Secrets{% endblock %}
{% block content %}
<div class="page-narrow">
  <div style="text-align:center;margin-bottom:28px">
    <h1 style="font-size:1.6rem;font-weight:800;letter-spacing:-0.5px">Start your free trial</h1>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px">14 days free. No credit card required.</p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="At least 6 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px">Create Account</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:20px;font-size:0.9rem;color:var(--text-muted)">
    Already have an account? <a href="/login">Sign in</a>
  </p>
</div>
{% endblock %}
